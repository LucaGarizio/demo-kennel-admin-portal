<div class="filters-container">
  @switch (type) { @case ('select') {
  <div class="filter-item">
    <label>{{ config[0]?.label }}</label>
    <p-select
      [options]="config[0]?.options"
      optionLabel="label"
      optionValue="value"
      [(ngModel)]="model.select"
      (ngModelChange)="update()"
      [ngModelOptions]="{ standalone: true }"
    ></p-select>
  </div>
  } @case ('text') {
  <div class="filter-item">
    <label>{{ label }}</label>

    <div class="input-clear-container">
      <input
        pInputText
        type="text"
        [(ngModel)]="model.value"
        [placeholder]="placeholder"
        (keyup.enter)="update()"
      />
      @if (model.value && model.value.length > 0) {
      <span class="clear-btn" (click)="model.value = ''; update()">✕</span>
      }
    </div>
  </div>
  } }
</div>
