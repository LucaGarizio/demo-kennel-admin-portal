@if(!loading()){
<div class="fade-wrapper" [class.fade-out]="loading()">
  <div class="grid justify-content-center">
    <div class="col-11">
      <h2 class="title text-primary text-center my-2">Il Pioppeto</h2>
      <h3 class="text-center sub-title mt-0 mb-5">Norme e Regolamento</h3>

      <app-terms-conditions [model]="model()"></app-terms-conditions>
    </div>

    <div class="col-11 col:md-6 mb-3">
      <div class="data-box"><strong>Data:</strong> {{ displayDate() | date : 'dd/MM/yyyy' }}</div>
    </div>

    <div class="col-12 flex justify-content-center md:justify-content-end col:md-6">
      <div class="firma-box">
        <canvas #signatureCanvas></canvas>
        <div class="firma-label">Firma qui</div>
      </div>
    </div>
  </div>

  <div class="grid justify-content-center md-justify-content-start mt-5 pb-5">
    <div class="col-9 md:col-11 flex justify-content-between md:justify-content-start p-0 gap-6">
      <button pButton label="Cancella" (click)="clearSignature()" class="p-button-sm"></button>
      <button pButton label="Conferma" (click)="onConfirm()" class="p-button-sm"></button>
    </div>
  </div>
</div>
}
