<div class="page-container">
  <app-page-header title="Modifica Proprietario"></app-page-header>
  @if (!loading()) {
  <app-owner-form
    [model]="model()"
    (save)="onSubmit($event)"
    (filesSelected)="onFilesSelected($event)"
    (deleteDocument)="onDeleteDoc($event)"
  ></app-owner-form>

  } @else {
  <p class="text-center mt-5">Caricamento...</p>
  }
</div>
