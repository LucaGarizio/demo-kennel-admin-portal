<app-page-header
  title="Lista Proprietari"
  [showCreate]="true"
  (create)="onCreate()"
></app-page-header>

<div class="grid mobile-compact-grid mb-4">
  <app-filter
    class="col-12 md:col-6 lg:col-4"
    type="text"
    field="owner_surname"
    label="Proprietario"
    placeholder="Cerca per Cognome"
  ></app-filter>

  <app-filter
    class="col-12 md:col-6 lg:col-4"
    type="text"
    field="phone_number"
    label="Numero di telefono"
    placeholder="N° Telefono"
  ></app-filter>
</div>

<p-card class="custom-card">
  <app-index-table
    tableHeight="70vh"
    [tableScrollHeight]="'63vh'"
    [data]="records()"
    [columns]="columns"
    [columnLabels]="columnLabels"
    [loading]="loading()"
    [showCreate]="showCreate()"
    (create)="onCreate()"
    (edit)="onEdit($event)"
    (delete)="openConfirm($event)"
    [getFileUrl]="getOwnerFileUrl"
    [getSignatureFileUrl]="getOwnerSignatureUrl"
    (downloadDocuments)="onDownloadOwnerDocuments($event)"
  ></app-index-table>
</p-card>

<app-confirm-dialog
  [visible]="confirmVisible()"
  (visibleChange)="confirmVisible.set($event)"
  [title]="'Conferma eliminazione'"
  [message]="confirmMessage()"
  (confirmed)="onConfirmResult($event)"
></app-confirm-dialog>
