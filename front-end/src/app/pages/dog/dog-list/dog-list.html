<app-page-header title="Lista Cani" [showCreate]="true" (create)="onCreate()"></app-page-header>

<div class="grid">
  <app-filter type="text" field="dog_name" label="Cane" placeholder="Nome cane"></app-filter>

  <app-filter
    type="text"
    field="owner_name"
    label="Proprietario"
    placeholder="Nome proprietario"
  ></app-filter>

  <app-filter
    type="text"
    field="microchip"
    label="Microchip"
    placeholder="Numero microchip"
  ></app-filter>
</div>

<p-card class="custom-card">
  <app-index-table
    [data]="records"
    [columns]="columns"
    [columnLabels]="columnLabels"
    [loading]="loading"
    (create)="onCreate()"
    (edit)="onEdit($event)"
    (delete)="openConfirm($event)"
    (cellClick)="onCellClick($event)"
    tableHeight="72vh"
    [tableScrollHeight]="'65vh'"
  ></app-index-table>
</p-card>

<app-confirm-dialog
  [(visible)]="confirmVisible"
  [title]="'Conferma eliminazione'"
  [message]="confirmMessage"
  (confirmed)="onConfirmResult($event)"
></app-confirm-dialog>

<app-details-dialog
  [visible]="showOwnerPreview"
  [owner]="hoverOwnerData"
  (close)="showOwnerPreview = false"
></app-details-dialog>
