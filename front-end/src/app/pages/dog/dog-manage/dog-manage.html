<div class="page-container">
  <app-page-header [title]="isEdit() ? 'Modifica Cane' : 'Aggiungi Nuovo Cane'"></app-page-header>

  @if (!loading() && model()) {
  <app-dogs-form
    [model]="model()!"
    [ownerOptions]="ownerOptions()"
    [tagliaOptions]="tagliaOptions()"
    [vaxOptions]="vaxOptions()"
    [pauraOptions]="pauraOptions()"
    [sexOptions]="sexOptions()"
    (save)="onSubmit($event)"
  ></app-dogs-form>
  } @else {
  <p class="text-center mt-4">Caricamento...</p>
  }
</div>
