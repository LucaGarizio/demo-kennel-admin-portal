<app-page-header
  title="Lista Soggiorni"
  [showCreate]="true"
  [showExport]="true"
  (create)="onCreate()"
  (export)="exportData()"
></app-page-header>

<div class="grid">
  <app-filter type="text" field="dog_name" label="Cane" placeholder="Nome cane"></app-filter>
  <app-filter type="select" field="period" [config]="periodFiltersConfig"></app-filter>
  <app-filter type="select" field="year" [config]="yearFilterConfig"> </app-filter>
  <app-filter type="select" field="month" [config]="monthFilterConfig"> </app-filter>
  <app-filter type="select" field="payment_type" [config]="paymentFilterConfig"> </app-filter>
</div>
<app-index-table
  [data]="records"
  [columns]="columns"
  [columnLabels]="columnLabels"
  [loading]="loading"
  (create)="onCreate()"
  (edit)="onEdit($event)"
  [showFooter]="true"
  [totals]="totals"
  (delete)="openConfirm($event)"
  (cellClick)="onCellClick($event)"
></app-index-table>

<app-confirm-dialog
  [(visible)]="confirmVisible"
  [title]="'Conferma eliminazione'"
  [message]="confirmMessage"
  (confirmed)="onConfirmResult($event)"
></app-confirm-dialog>

<app-owner-dialog
  [visible]="showOwnerPreview"
  [owner]="hoverOwnerData"
  (close)="showOwnerPreview = false"
></app-owner-dialog>
