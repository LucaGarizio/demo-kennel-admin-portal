<app-page-header
  title="Lista Soggiorni"
  [showCreate]="true"
  (create)="onCreate()"
></app-page-header>

<div class="grid mobile-compact-grid mb-4">
  <app-filter class="col-6 md:col" type="text" field="dog_name" label="Cane" placeholder="Nome cane"></app-filter>
  <app-filter class="col-6 md:col" type="select" field="period" [config]="periodFiltersConfig"></app-filter>
  <app-filter class="col-6 md:col" type="select" field="year" [config]="yearFilterConfig()"> </app-filter>
  <app-filter class="col-6 md:col" type="select" field="month" [config]="monthFilterConfig"> </app-filter>
  <app-filter class="col-12 md:col" type="select" field="payment_type" [config]="paymentFilterConfig"> </app-filter>
</div>

<p-card class="custom-card">
  <app-index-table
    [data]="records()"
    [columns]="columns"
    [columnLabels]="columnLabels"
    [loading]="loading()"
    [showExport]="true"
    (export)="exportData()"
    (create)="onCreate()"
    (edit)="onEdit($event)"
    [showFooter]="true"
    [totals]="totals()"
    (delete)="openConfirm($event)"
    (cellClick)="onCellClick($event)"
    tableHeight="69vh"
    [tableScrollHeight]="'63vh'"
  ></app-index-table>
</p-card>

<app-confirm-dialog
  [visible]="confirmVisible()"
  (visibleChange)="confirmVisible.set($event)"
  [title]="'Conferma eliminazione'"
  [message]="confirmMessage()"
  (confirmed)="onConfirmResult($event)"
></app-confirm-dialog>

<app-details-dialog
  [visible]="showDetailsPreview()"
  [owner]="hoverOwnerData()"
  [dogs]="hoverDogData()"
  (close)="closeDetails()"
></app-details-dialog>
