<p-menubar class="mb-5" style="margin: -8px">
  <ng-template pTemplate="start">
    <span class="text-xl font-bold text-primary">Il Pioppeto</span>
  </ng-template>

  <ng-template pTemplate="end">
    <a routerLink="/lista-proprietari" routerLinkActive="active-link" class="nav-link">
      Proprietari
    </a>

    <a routerLink="/lista-cani" routerLinkActive="active-link" class="nav-link ml-4"> Cani </a>

    <a routerLink="/lista-soggiorni" routerLinkActive="active-link" class="nav-link ml-4">
      Soggiorni
    </a>

    <a routerLink="/box" routerLinkActive="active-link" class="nav-link ml-4"> Box </a>
  </ng-template>
</p-menubar>
