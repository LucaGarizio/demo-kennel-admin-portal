<div class="page-container">
  <h2 class="text-center">Lista Soggiorni</h2>

  <app-index-table
    [data]="records"
    [columns]="columns"
    [columnLabels]="columnLabels"
    [loading]="loading"
    (create)="onCreate()"
    (edit)="onEdit($event)"
    (delete)="openConfirm($event)"
  ></app-index-table>

  <app-confirm-dialog
    [(visible)]="confirmVisible"
    [title]="'Conferma eliminazione'"
    [message]="confirmMessage"
    (confirmed)="onConfirmResult($event)"
  ></app-confirm-dialog>
</div>
