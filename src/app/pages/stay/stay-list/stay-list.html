<h2 class="text-center">Lista Soggiorni</h2>

<app-filters [config]="filtersConfig" (changed)="onFiltersChanged($event)"></app-filters>

<app-index-table
  [data]="records"
  [columns]="columns"
  [columnLabels]="columnLabels"
  [loading]="loading"
  (create)="onCreate()"
  (edit)="onEdit($event)"
  (delete)="openConfirm($event)"
  (cellClick)="onCellClick($event)"
></app-index-table>

<app-confirm-dialog
  [(visible)]="confirmVisible"
  [title]="'Conferma eliminazione'"
  [message]="confirmMessage"
  (confirmed)="onConfirmResult($event)"
></app-confirm-dialog>

<app-owner-dialog
  [visible]="showOwnerPreview"
  [owner]="hoverOwnerData"
  (close)="showOwnerPreview = false"
></app-owner-dialog>
