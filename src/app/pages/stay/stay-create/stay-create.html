<div class="page-container">
  <h2 class="text-center">Aggiungi Nuovo Soggiorno</h2>
  <app-index-form
    type="stay"
    [model]="model"
    [ownerOptions]="ownerOptions"
    [dogOptions]="dogOptions"
    [areaOptions]="areaOptions"
    [boxOptions]="boxOptions"
    (ownerChange)="onOwnerSelected($event)"
    (dogsChange)="onDogsChanged()"
    (areaChange)="onAreaSelected($event)"
    (boxChange)="onBoxSelected($event)"
    (arrivalChange)="onArrivalDateChange()"
    (departureChange)="onDepartureDateChange()"
    (depositChange)="onDepositChange()"
    (save)="onSubmit($event)"
  ></app-index-form>
</div>
