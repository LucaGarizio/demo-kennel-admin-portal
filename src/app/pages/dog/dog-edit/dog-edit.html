<div class="page-container">
  <app-page-header title="Modifica Cane"></app-page-header>
  @if (!loading) {
  <app-index-form
    type="dogs"
    [model]="model"
    [ownerOptions]="ownerOptions"
    [tagliaOptions]="tagliaOptions"
    [vaxOptions]="vaxOptions"
    [pauraOptions]="pauraOptions"
    [sexOptions]="sexOptions"
    (save)="onSubmit($event)"
  ></app-index-form>
  } @else {
  <p class="text-center mt-4">Caricamento...</p>
  }
</div>
