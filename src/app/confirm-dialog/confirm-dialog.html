<p-dialog
  [header]="title"
  [modal]="true"
  [(visible)]="visible"
  [style]="{ width: '25rem' }"
  (onHide)="onClose(false)"
  [closable]="false"
>
  <p class="mb-4 text-lg text-center" [innerHTML]="message"></p>
  <div class="flex justify-content-center gap-5 mt-5">
    <p-button label="Annulla" severity="secondary" (click)="onClose(false)" />
    <p-button label="Conferma" severity="danger" (click)="onClose(true)" />
  </div>
</p-dialog>
